function convertirEnDate(dateStr) {
    if (!dateStr) return new Date(0);

    // Si la date contient des tirets (format HTML YYYY-MM-DD)
    if (dateStr.includes('-')) {
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d);
    } 
    // Si la date contient des slashs (ton ancien format DD/MM/YYYY)
    else if (dateStr.includes('/')) {
        const [d, m, y] = dateStr.split('/').map(Number);
        return new Date(y, m - 1, d);
    }
    return new Date(0);
}

    
function majAffichage() {
    if (!voitureCourante || !hangar[voitureCourante]) return;
    
    document.getElementById("titre-voiture-alertes").textContent = voitureCourante;
    const container = document.getElementById("maintenance-tables-container");
    container.innerHTML = "";
    
    const groupes = [
        { id: "Moteur", titre: "⚙️ CATÉGORIE : MOTEUR", class: "cat-moteur", cles: ["Moteur"] },
        { id: "Transmission", titre: "⛓️ CATÉGORIE : TRANSMISSION", class: "cat-transmission", cles: ["Transmission"] },
        { id: "Freins", titre: "🛑 CATÉGORIE : FREINS", class: "cat-freins", cles: ["Frein", "Freinage", "Freins"] },
        { id: "Train avant", titre: "🚘 CATÉGORIE : TRAIN AVANT", class: "cat-train-avant", cles: ["Train avant"] },
        { id: "Train arrière", titre: "🏎️ CATÉGORIE : TRAIN ARRIÈRE", class: "cat-train-arriere", cles: ["Train arrière"] }
    ];

    groupes.forEach(g => {
        let div = document.createElement("div");
        div.className = "category-header " + g.class;
        div.innerHTML = `<span style="color: white; font-weight: bold;">${g.titre}</span>`;
        
        let table = document.createElement("table");
        table.innerHTML = `<thead><tr><th>Pièce</th><th>Quotas heures</th><th>Status</th><th>Temps restant</th><th>Action</th></tr></thead><tbody></tbody>`;
        let tbody = table.querySelector("tbody");

        const pieces = hangar[voitureCourante].pieces || {}; 
        
        Object.entries(pieces).forEach(([id, p]) => {
            // SÉCURITÉ : Vérifie que l'objet a bien une catégorie avant de comparer
            if (p && p.cat && g.cles.includes(p.cat)) {
                let dateMontage = convertirEnDate(p.dernierChangement);
                let heuresCalculees = (hangar[voitureCourante].historique || [])
                    .filter(s => convertirEnDate(s.date) >= dateMontage)
                    .reduce((total, s) => total + parseFloat(s.duree || 0), 0);
                
                let margeRestante = p.limite - heuresCalculees;
                let seuilAlerte = p.limite * 0.15;
                
                let statutTexte = 'OK';
                let statutClass = 'status-ok';
                
                if (margeRestante <= 0) {
                    statutTexte = 'Changement';
                    statutClass = 'status-danger';
                } else if (margeRestante <= seuilAlerte) {
                    statutTexte = 'À prévoir';
                    statutClass = 'status-warn';
                }
                            
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <strong>${p.nom || "Sans nom"}</strong>
                        <span class="date-changement">${p.dernierChangement ? 'Montée le : ' + p.dernierChangement : 'Aucune date'}</span>
                    </td>
                    <td>${heuresCalculees.toFixed(2)} h</td>
                    <td>${p.limite || 0} h</td>
                    <td>${margeRestante.toFixed(2)} h</td>
                    <td><span class="status ${statutClass}">${statutTexte}</span></td>
                    <td>
                        <div class="action-cell">
                            <input type="date" id="date-input-${id}" class="table-date-input">
                            <button class="btn-reset" onclick="remplacerPiece('${id}')">🛠️</button>
                            <button class="btn-cancel-date" onclick="annulerDateChangement('${id}')">❌</button>
                            <button class="btn-delete-row" onclick="supprimerPiece('${id}')">🗑️</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
        
        let trAjout = document.createElement("tr");
        trAjout.innerHTML = `<td colspan="6" style="text-align:center; background:#f0f0f0; padding: 10px;">
            <button class="btn-add-piece" onclick="ajouterPiecePourCategorie('${g.id}')">
                ➕ Ajouter une pièce dans ${g.id}
            </button></td>`;
        tbody.appendChild(trAjout);
        container.appendChild(div);
        container.appendChild(table);
    });
}
    
    
   import { get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"; // Importe 'get' et 'child'
    
    document.getElementById("form-voiture").addEventListener("submit", (e) => {
        e.preventDefault();
        const nomVoiture = document.getElementById("new-voiture-nom").value.trim();
        
        if (!nomVoiture) return;
    
        // On utilise cataloguePiecesStandard au lieu de {}
        set(ref(db, `hangar/${nomVoiture}`), {
            historique: [{ date: new Date().toISOString().split('T')[0], evenement: "Initialisation", circuit: "N/A", duree: 0, notes: "Création châssis" }],
            pieces: cataloguePiecesStandard 
        }).then(() => {
            alert("Châssis " + nomVoiture + " créé avec ses pièces standards !");
            document.getElementById("new-voiture-nom").value = "";
        }).catch((error) => {
            console.error("Erreur Firebase : ", error);
        });
    });
        
    document.getElementById("form-session").addEventListener("submit", async (e) => {
        e.preventDefault();
        const date = document.getElementById("date").value;
        const evenement = document.getElementById("event").value;
        const circuit = document.getElementById("circuit").value;
        const duree = parseFloat(document.getElementById("duree").value);
        const notes = document.getElementById("notes").value;
        const checkboxes = document.querySelectorAll(".check-voiture:checked");
    
        if (checkboxes.length === 0) { alert("Veuillez sélectionner au moins une voiture."); return; }
    
        // Utilisation d'une boucle asynchrone pour traiter chaque voiture proprement
        for (const cb of checkboxes) {
            const nomVoiture = cb.value;
            const refHistorique = ref(db, `hangar/${nomVoiture}/historique`);
            
            try {
                const snapshot = await get(refHistorique);
                let hist = snapshot.val() || [];
                hist.push({ date, evenement, circuit, duree, notes });
                await update(ref(db, `hangar/${nomVoiture}`), { historique: hist });
            } catch (error) {
                console.error("Erreur lors de la mise à jour pour " + nomVoiture, error);
            }
        }
        
        alert("Sessions enregistrées !");
        document.getElementById("form-session").reset(); // Vide le formulaire après l'envoi
    });
</script>
