<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Cup - Realtime Maintenance Expert</title>
    <style>
        :root {
            --primary: #e60000;
            --dark: #121212;
            --dark-card: #1e1e1e;
            --light: #f5f6fa;
            --border: #dddddd;
            --success: #2ecc71;
            --warning: #e67e22;
            --danger: #e74c3c;
            --moteur-color: #2980b9;
            --trans-color: #8e44ad;
            --frein-color: #c0392b;
            --train-av-color: #16a085;
            --train-ar-color: #d35400;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background-color: var(--dark);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        header h1 { margin: 0 0 5px 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        header p { margin: 0; color: #aaa; font-size: 14px; }

        .selector-box {
            background: #252525;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .selector-box label { color: #fff; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .selector-box select {
            width: 220px;
            padding: 8px;
            margin-top: 5px;
            font-weight: bold;
            font-size: 15px;
            background: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .grid-main {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        @media (max-width: 1024px) {
            .grid-main { grid-template-columns: 1fr; }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .card h2 { 
            margin: 0 0 20px 0; 
            font-size: 18px; 
            font-weight: 700;
            border-bottom: 2px solid var(--light);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-header {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 25px 0 10px 0;
            padding: 8px 12px;
            color: white;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        .cat-moteur { background-color: var(--moteur-color); }
        .cat-transmission { background-color: var(--trans-color); }
        .cat-freinage { background-color: var(--frein-color); }
        .cat-train-avant { background-color: var(--train-av-color); }
        .cat-train-arriere { background-color: var(--train-ar-color); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            vertical-align: middle;
        }

        th { 
            background-color: #fafafa; 
            font-weight: 600; 
            color: #666;
            text-transform: uppercase;
            font-size: 11px;
        }

        tr:hover td { background-color: #f9f9f9; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #444; }
        input, select, textarea {
            width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }

        .table-date-input {
            width: 120px;
            padding: 4px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 5px;
            display: inline-block;
        }

        button {
            background-color: var(--primary); color: white; border: none; padding: 12px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s;
            width: 100%; text-transform: uppercase;
        }
        button:hover { background-color: #cc0000; }
        button.secondary { background-color: #444; }
        button.secondary:hover { background-color: #222; }
        
        button.btn-reset {
            background-color: #555; padding: 5px 10px; font-size: 11px; width: auto; border-radius: 3px;
            display: inline-block; text-transform: none;
        }
        button.btn-reset:hover { background-color: var(--success); }

        .status {
            padding: 3px 6px; border-radius: 4px; color: white; font-weight: bold; display: inline-block; font-size: 10px; text-transform: uppercase;
            text-align: center; width: 80px;
        }
        .status-ok { background-color: var(--success); }
        .status-warn { background-color: var(--warning); }
        .status-danger { background-color: var(--danger); }

        .badge-voiture {
            background-color: var(--primary); color: white; padding: 2px 8px; border-radius: 20px; font-size: 14px; margin-left: auto;
        }

        .date-changement {
            font-size: 11px;
            color: #777;
            display: block;
            margin-top: 2px;
            font-style: italic;
        }

        .action-cell {
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        #loading-sync {
            background-color: #2ecc71;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Fun Cup - Live Track & Maintenance</h1>
            <p>Gestion d'Atelier par Catégories de Pièces <span id="loading-sync">🔄 Synchronisé</span></p>
        </div>
        <div class="selector-box">
            <label for="select-voiture">🚗 Sélectionner la Voiture :</label><br>
            <select id="select-voiture" onchange="changerVoitureCourante()"></select>
        </div>
    </header>

    <div class="grid-main">
        <div>
            <div class="card">
                <h2>➕ Nouvelle Voiture</h2>
                <form id="form-voiture">
                    <div class="form-group">
                        <label for="new-voiture-nom">N° de Châssis / Nom :</label>
                        <input type="text" id="new-voiture-nom" placeholder="ex: Châssis #420" required>
                    </div>
                    <button type="submit" class="secondary">Initialiser au Catalogue</button>
                </form>
            </div>

            <div class="card">
                <h2>⏱️ Nouveau Roulage</h2>
                <form id="form-session">
                    <div class="form-group">
                        <label for="date">Date du Roulage :</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="event">Événement :</label>
                        <input type="text" id="event" placeholder="ex: 24H de Spa" required>
                    </div>
                    <div class="form-group">
                        <label for="circuit">Circuit :</label>
                        <input type="text" id="circuit" placeholder="ex: Spa-Francorchamps" required>
                    </div>
                    <div class="form-group">
                        <label for="duree">Temps de roulage (heures) :</label>
                        <input type="number" id="duree" step="0.01" min="0.01" placeholder="ex: 7.0" required>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes Techniques du Mécano :</label>
                        <textarea id="notes" rows="3" placeholder="RAS, vérification pressions..."></textarea>
                    </div>
                    <button type="submit">Enregistrer le roulage</button>
                </form>
            </div>
        </div>

        <div>
            <div class="card">
                <div style="display: flex; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0; border: none; padding: 0;">🔧 Plan de Maintenance Catégorisé</h2>
                    <span class="badge-voiture" id="titre-voiture-alertes">-</span>
                </div>
                
                <div id="maintenance-tables-container">
                    </div>
            </div>

            <div class="card">
                <div style="display: flex; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0; border: none; padding: 0;">📊 Tableau de Course & Sessions</h2>
                    <span class="badge-voiture" id="titre-voiture-historique">-</span>
                </div>
                <div style="overflow-x: auto;">
                    <table id="table-course">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Événement</th>
                                <th>Circuit</th>
                                <th>Durée de roulage</th>
                                <th>Notes d'Atelier</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD1Ea_dUlVMyyJhxdyxyoZrR5EIBnvb_iQ",
        authDomain: "funcup-maintenance.firebaseapp.com",
        databaseURL: "https://funcup-maintenance-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "funcup-maintenance",
        storageBucket: "funcup-maintenance.firebasestorage.app",
        messagingSenderId: "1046060984934",
        appId: "1:1046060984934:web:00c0c99451268a4cb99ba7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const cataloguePiecesStandard = [
        { cat: "Moteur", nom: "Moteur VW Evo 3 (Révision Générale)", heuresActuelles: 0, limite: 200, dernierChangement: "" },
        { cat: "Moteur", nom: "Bougies", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Moteur", nom: "Démarreur", heuresActuelles: 0, limite: 400, dernierChangement: "" },
        { cat: "Moteur", nom: "Alternateur", heuresActuelles: 0, limite: 400, dernierChangement: "" },
        { cat: "Moteur", nom: "Huile et filtre à huile", heuresActuelles: 0, limite: 25, dernierChangement: "" },
        { cat: "Moteur", nom: "Filtre à essence", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Moteur", nom: "Pompe à Essence", heuresActuelles: 0, limite: 200, dernierChangement: "" },
        { cat: "Moteur", nom: "Filtre à air", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Moteur", nom: "Bobine", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Moteur", nom: "Régulateur de pression essence", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Moteur", nom: "Vase expansion et bouchon", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Moteur", nom: "Courroie d'accessoires", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Transmission", nom: "Boîte de Vitesses Sadev (Révision)", heuresActuelles: 0, limite: 90, dernierChangement: "" },
        { cat: "Transmission", nom: "Disque d'embrayage", heuresActuelles: 0, limite: 200, dernierChangement: "" },
        { cat: "Transmission", nom: "Mécanisme d'embrayage", heuresActuelles: 0, limite: 400, dernierChangement: "" },
        { cat: "Transmission", nom: "Coupelle de pompe", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Transmission", nom: "Butée (coupelle et roulement)", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Transmission", nom: "Cardan droit", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Transmission", nom: "Cardan gauche", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Transmission", nom: "Groupe paddle shift", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Transmission", nom: "Vérin paddle shift", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train avant", nom: "Roulement de roue AVD", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train avant", nom: "Roulement de roue AVG", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train avant", nom: "Rotule inférieure de pivot D", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Train avant", nom: "Rotule inférieure de pivot G", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Train avant", nom: "Rotule supérieure amortisseur D", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train avant", nom: "Rotule supérieure amortisseur G", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train avant", nom: "Rotule de direction D", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train avant", nom: "Rotule de direction G", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train avant", nom: "Barre de direction D", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train avant", nom: "Barre de direction G", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train avant", nom: "Amortisseur D", heuresActuelles: 0, limite: 80, dernierChangement: "" },
        { cat: "Train avant", nom: "Amortisseur G", heuresActuelles: 0, limite: 80, dernierChangement: "" },
        { cat: "Train arrière", nom: "Roulement de roue ARD", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train arrière", nom: "Roulement de roue ARG", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train arrière", nom: "Rotule inférieure de pivot D", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Train arrière", nom: "Rotule inférieure de pivot G", heuresActuelles: 0, limite: 50, dernierChangement: "" },
        { cat: "Train arrière", nom: "Rotule supérieure amortisseur D", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train arrière", nom: "Rotule supérieure amortisseur G", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train arrière", nom: "Rotule de direction D", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train arrière", nom: "Rotule de direction G", heuresActuelles: 0, limite: 75, dernierChangement: "" },
        { cat: "Train arrière", nom: "Barre de direction D", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train arrière", nom: "Barre de direction G", heuresActuelles: 0, limite: 150, dernierChangement: "" },
        { cat: "Train arrière", nom: "Amortisseur D", heuresActuelles: 0, limite: 80, dernierChangement: "" },
        { cat: "Train arrière", nom: "Amortisseur G", heuresActuelles: 0, limite: 80, dernierChangement: "" },
        { cat: "Frein", nom: "Coupelles de pompes", heuresActuelles: 0, limite: 100, dernierChangement: "" },
        { cat: "Frein", nom: "Coupelles d'étriers", heuresActuelles: 0, limite: 200, dernierChangement: "" }
    ];

    // On unifie la gestion de "Frein" et "Freinage" sous un seul libellé propre
    const categoriesMapping = {
        "Moteur": { titre: "Moteur", class: "cat-moteur" },
        "Transmission": { titre: "Transmission", class: "cat-transmission" },
        "Freinage": { titre: "Freinage & Circuits Hydrauliques", class: "cat-freinage" },
        "Frein": { titre: "Freinage & Circuits Hydrauliques", class: "cat-freinage" }, // Redirection automatique
        "Train avant": { titre: "Train Avant", class: "cat-train-avant" },
        "Train arrière": { titre: "Train Arrière", class: "cat-train-arriere" }
    };

    let hangar = {};
    let voitureCourante = "";

    function obtenirDateDuJour() {
        return new Date().toISOString().split('T')[0];
    }

    const dbRef = ref(db, 'hangar');
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        
        const syncBadge = document.getElementById("loading-sync");
        syncBadge.style.display = "inline-block";
        setTimeout(() => { syncBadge.style.display = "none"; }, 1500);

        if (data) {
            hangar = data;
            
            // SÉCURITÉ ANTI-PIÈCES MANQUANTES : Vérification et mise à jour automatique des structures
            Object.keys(hangar).forEach(nomVoiture => {
                if (!hangar[nomVoiture].pieces || hangar[nomVoiture].pieces.length < cataloguePiecesStandard.length) {
                    console.log(`Mise à niveau automatique des 52 pièces pour ${nomVoiture}...`);
                    let piecesExistantes = hangar[nomVoiture].pieces || [];
                    
                    let piecesCompletes = cataloguePiecesStandard.map(pieceStandard => {
                        let trouvee = piecesExistantes.find(p => p.nom === pieceStandard.nom);
                        return trouvee ? trouvee : JSON.parse(JSON.stringify(pieceStandard));
                    });
                    
                    hangar[nomVoiture].pieces = piecesCompletes;
                    update(ref(db, `hangar/${nomVoiture}`), { pieces: piecesCompletes });
                }
            });

            if (!voitureCourante || !hangar[voitureCourante]) {
                voitureCourante = Object.keys(hangar)[0];
            }
        } else {
            hangar = {
                "Châssis Exemple #000": {
                    pieces: JSON.parse(JSON.stringify(cataloguePiecesStandard)),
                    historique: []
                }
            };
            set(ref(db, 'hangar'), hangar);
            voitureCourante = "Châssis Exemple #000";
        }
        
        rafraichirSelecteur();
        majAffichage();
    });

    function rafraichirSelecteur() {
        const select = document.getElementById("select-voiture");
        select.innerHTML = "";
        Object.keys(hangar).forEach(nomVoiture => {
            let option = document.createElement("option");
            option.value = nomVoiture;
            option.textContent = nomVoiture;
            if (nomVoiture === voitureCourante) option.selected = true;
            select.appendChild(option);
        });
    }

    window.changerVoitureCourante = function() {
        voitureCourante = document.getElementById("select-voiture").value;
        majAffichage();
    }

    window.remplacerPieceFormulaire = function(indexPiece) {
        if (!voitureCourante) return;
        
        let dateInputEl = document.getElementById(`date-change-${indexPiece}`);
        let dateSaisie = dateInputEl.value;
        
        if (!dateSaisie) {
            alert("Sélectionnez une date.");
            return;
        }

        let piece = hangar[voitureCourante].pieces[indexPiece];
        let parts = dateSaisie.split("-");
        let dateFr = `${parts[2]}/${parts[1]}/${parts[0]}`;

        if (confirm(`Changement de la pièce "${piece.nom}" en date du ${dateFr} ?`)) {
            update(ref(db, `hangar/${voitureCourante}/pieces/${indexPiece}`), {
                heuresActuelles: 0,
                dernierChangement: dateFr
            });
        }
    }

    function majAffichage() {
        if (!voitureCourante || !hangar[voitureCourante]) return;

        document.getElementById("titre-voiture-alertes").textContent = voitureCourante;
        document.getElementById("titre-voiture-historique").textContent = voitureCourante;

        let donneesVoiture = hangar[voitureCourante];
        let dateAujourdhui = obtenirDateDuJour();

        const container = document.getElementById("maintenance-tables-container");
        container.innerHTML = "";

        // Définition de l'ordre d'affichage désiré pour les catégories regroupées
        const groupesAxe = [
            { id: "Moteur", titre: "⚙️ Catégorie : Moteur", class: "cat-moteur", cles: ["Moteur"] },
            { id: "Transmission", titre: "⛓️ Catégorie : Transmission", class: "cat-transmission", cles: ["Transmission"] },
            { id: "Freinage", titre: "🛑 Catégorie : Freinage & Hydraulique", class: "cat-freinage", cles: ["Freinage", "Frein"] },
            { id: "Train avant", titre: "🚘 Catégorie : Train Avant", class: "cat-train-avant", cles: ["Train avant"] },
            { id: "Train arrière", titre: "🏎️ Catégorie : Train Arrière", class: "cat-train-arriere", cles: ["Train arrière"] }
        ];

        // Créer les 5 sections distinctes
        groupesAxe.forEach(groupe => {
            let divGroupe = document.createElement("div");
            divGroupe.className = `category-header ${groupe.class}`;
            divGroupe.innerHTML = `<span>${groupe.titre}</span>`;
            
            let divTableWrapper = document.createElement("div");
            divTableWrapper.style.overflowX = "auto";
            
            let table = document.createElement("table");
            table.innerHTML = `
                <thead>
                    <tr>
                        <th style="width: 35%;">Composant / Pièce</th>
                        <th style="width: 15%;">Heures Actuelles</th>
                        <th style="width: 12%;">Potentiel</th>
                        <th style="width: 13%;">Marge Restante</th>
                        <th style="width: 10%;">Statut</th>
                        <th style="width: 15%;">Action Atelier</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;
            
            let tbody = table.querySelector("tbody");
            let aDesPieces = false;

            if (donneesVoiture.pieces) {
                donneesVoiture.pieces.forEach((piece, index) => {
                    // On vérifie si la pièce appartient à l'une des clés du groupe
                    if (groupe.cles.includes(piece.cat)) {
                        aDesPieces = true;
                        let reste = piece.limite - piece.heuresActuelles;
                        let statutClass = "status-ok";
                        let statutTexte = "OK";

                        if (reste <= 0) {
                            statutClass = "status-danger";
                            statutTexte = "Remplacer";
                        } else if (reste <= 4) {
                            statutClass = "status-warn";
                            statutTexte = "À Prévoir";
                        }

                        let infoDate = piece.dernierChangement ? `Monté le : ${piece.dernierChangement}` : "Aucun historique date";

                        let tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>
                                <strong>${piece.nom}</strong>
                                <span class="date-changement">${infoDate}</span>
                            </td>
                            <td>${piece.heuresActuelles.toFixed(2)} h</td>
                            <td>${piece.limite} h</td>
                            <td style="color: ${reste <= 4 ? 'var(--danger)' : 'inherit'}; font-weight: ${reste <= 4 ? 'bold' : 'normal'}">
                                ${reste.toFixed(2)} h
                            </td>
                            <td><span class="status ${statutClass}">${statutTexte}</span></td>
                            <td>
                                <div class="action-cell">
                                    <input type="date" id="date-change-${index}" class="table-date-input" value="${dateAujourdhui}">
                                    <button class="btn-reset" onclick="remplacerPieceFormulaire(${index})">🛠️ Remplacer</button>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                });
            }

            if (!aDesPieces) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999; font-style:italic;">Aucune pièce configurée.</td></tr>`;
            }

            divTableWrapper.appendChild(table);
            container.appendChild(divGroupe);
            container.appendChild(divTableWrapper);
        });

        // Mise à jour de l'historique global des roulages de la voiture
        const tbodyCourse = document.querySelector("#table-course tbody");
        tbodyCourse.innerHTML = "";
        
        if (!donneesVoiture.historique || donneesVoiture.historique.length === 0) {
            tbodyCourse.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; font-style:italic;">Aucune session de course enregistrée. Saisissez un roulage à gauche.</td></tr>`;
        } else {
            donneesVoiture.historique.forEach(session => {
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><strong>${session.date}</strong></td>
                    <td>${session.evenement}</td>
                    <td>${session.circuit}</td>
                    <td><strong style="color:var(--primary);">${session.duree.toFixed(2)} h</strong></td>
                    <td><small>${session.notes ? session.notes : '<i>Aucune note</i>'}</small></td>
                `;
                tbodyCourse.appendChild(tr);
            });
        }
    }

    document.getElementById("form-voiture").addEventListener("submit", function(e) {
        e.preventDefault();
        let nom = document.getElementById("new-voiture-nom").value.trim();

        if (hangar[nom]) {
            alert("Cette voiture est déjà enregistrée !");
            return;
        }

        let nouvelleVoiture = {
            pieces: JSON.parse(JSON.stringify(cataloguePiecesStandard)),
            historique: []
        };

        set(ref(db, `hangar/${nom}`), nouvelleVoiture).then(() => {
            voitureCourante = nom;
            document.getElementById("form-voiture").reset();
        });
    });

    document.getElementById("form-session").addEventListener("submit", function(e) {
        e.preventDefault();
        if (!voitureCourante) return;

        let dateInput = document.getElementById("date").value;
        let event = document.getElementById("event").value;
        let circuit = document.getElementById("circuit").value;
        let duree = parseFloat(document.getElementById("duree").value);
        let notes = document.getElementById("notes").value;

        let dateParts = dateInput.split("-");
        let dateFr = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

        let historiqueMaj = hangar[voitureCourante].historique || [];
        historiqueMaj.unshift({
            date: dateFr, evenement: event, circuit: circuit, duree: duree, notes: notes
        });

        let piecesMaj = hangar[voitureCourante].pieces.map(piece => {
            piece.heuresActuelles += duree;
            return piece;
        });

        update(ref(db, `hangar/${voitureCourante}`), {
            historique: historiqueMaj,
            pieces: piecesMaj
        }).then(() => {
            document.getElementById("form-session").reset();
        });
    });
</script>

</body>
</html>
